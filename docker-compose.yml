version: "3.9"

networks:
  subscribeapp-net:
    driver: bridge

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: subscribeapp-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-SubscribeApp_Str0ng!}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - subscribeapp-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:-SubscribeApp_Str0ng!}' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subscribeapp-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=SubscribeApp;User Id=sa;Password=${SA_PASSWORD:-SubscribeApp_Str0ng!};TrustServerCertificate=True"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - subscribeapp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: subscribeapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - subscribeapp-net

volumes:
  mssql-data:
